{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --cream: #fdf6ec;
      --deep: #1a0f00;
      --card-bg: rgba(255,255,255,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #0f0800;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(201,168,76,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 50%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 80% 80% at 50% 100%, rgba(201,168,76,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating confetti dots */
    .confetti-dot {
      position: fixed;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 1s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Thin decorative line */
    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1.4rem auto;
    }

    /* Portal cards */
    .portal-card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 20px;
      padding: 2.8rem 2.2rem 2.4rem;
      width: 220px;
      cursor: pointer;
      transition: transform 0.35s cubic-bezier(.22,1,.36,1),
                  border-color 0.3s ease,
                  box-shadow 0.35s ease;
      backdrop-filter: blur(12px);
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.1rem;
      overflow: hidden;
    }

    .portal-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.13), transparent 70%);
      opacity: 0;
      transition: opacity 0.35s ease;
      border-radius: inherit;
    }

    .portal-card:hover::before { opacity: 1; }

    .portal-card:hover {
      transform: translateY(-10px) scale(1.03);
      border-color: rgba(201,168,76,0.65);
      box-shadow:
        0 0 40px rgba(201,168,76,0.15),
        0 20px 60px rgba(0,0,0,0.5);
    }

    .portal-card:active { transform: translateY(-4px) scale(1.01); }

    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,168,76,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(201,168,76,0.07);
      transition: border-color 0.3s ease, background 0.3s ease;
    }

    .portal-card:hover .icon-wrap {
      border-color: rgba(201,168,76,0.7);
      background: rgba(201,168,76,0.14);
    }

    .icon-wrap svg {
      width: 38px;
      height: 38px;
      fill: var(--gold);
      transition: transform 0.4s cubic-bezier(.22,1,.36,1);
    }

    .portal-card:hover .icon-wrap svg { transform: scale(1.12); }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--gold-light);
      letter-spacing: 0.04em;
    }

    .card-sub {
      font-size: 0.76rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1.4;
    }

    .arrow-hint {
      font-size: 0.72rem;
      color: rgba(201,168,76,0.5);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.3s ease, letter-spacing 0.3s ease;
    }

    .portal-card:hover .arrow-hint {
      color: var(--gold);
      letter-spacing: 0.2em;
    }

    /* Heading */
    .main-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      color: var(--cream);
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .main-title span {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 60%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.06em;
    }

    /* Cake icon at top */
    .cake-badge {
      width: 52px;
      height: 52px;
      margin: 0 auto 1.2rem;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.2); }
      50%       { box-shadow: 0 0 0 12px rgba(201,168,76,0); }
    }
  </style>
</head>
<body>

  <!-- Floating confetti dots (JS generated) -->

  <div class="wrapper">

    <!-- Top cake badge -->
    <div class="cake-badge">
      <svg viewBox="0 0 24 24" fill="none" width="26" height="26">
        <path d="M12 3c0 0-1-1.5-1-2.5S12 0 12 0s1 1 1 2.5-1 .5-1 .5Z" fill="#c9a84c" opacity=".5"/>
        <rect x="3" y="10" width="18" height="3" rx="1.5" fill="#c9a84c" opacity=".35"/>
        <rect x="2" y="13" width="20" height="8" rx="2" fill="#c9a84c" opacity=".22"/>
        <path d="M2 17h20" stroke="#c9a84c" stroke-width="1.2" stroke-dasharray="3 2" opacity=".4"/>
        <circle cx="7"  cy="10" r="1" fill="#c9a84c" opacity=".7"/>
        <circle cx="12" cy="10" r="1" fill="#c9a84c" opacity=".7"/>
        <circle cx="17" cy="10" r="1" fill="#c9a84c" opacity=".7"/>
      </svg>
    </div>

    <p class="subtitle mb-2 tracking-widest">✦ BIRTHDAY PORTAL ✦</p>

    <h1 class="main-title">
      Choose Your<br><span>Experience</span>
    </h1>

    <div class="divider"></div>

    <p style="color:rgba(255,255,255,0.28); font-size:0.82rem; margin-bottom:2.8rem; letter-spacing:0.04em;">
      Select a portal to view the birthday poster
    </p>

    <!-- Cards row -->
    <div style="display:flex; gap:1.6rem; justify-content:center; flex-wrap:wrap;">

      <!-- Parent Card -->
      <a href="{% url 'parent' %}" class="portal-card">
        <div class="icon-wrap">
          <!-- Parent / family SVG -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10ZM4 20c0-3.87 3.58-7 8-7s8 3.13 8 7H4Z"/>
            <path d="M17.5 7.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5ZM20 14c0-1.38-.96-2.6-2.36-3.38A6.52 6.52 0 0 1 20 13h2c0-3.31-3.13-6-7-6a7.3 7.3 0 0 1 1 .07" opacity=".55"/>
          </svg>
        </div>
        <div>
          <div class="card-title">Parent</div>
          <div class="card-sub" style="margin-top:4px;">Family poster</div>
        </div>
        <div class="arrow-hint">View → </div>
      </a>

      <!-- Employee Card -->
      <a href="{% url 'employee' %}" class="portal-card">
        <div class="icon-wrap">
          <!-- Employee / ID badge SVG -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="2" width="16" height="20" rx="2" fill-opacity=".0" stroke="#c9a84c" stroke-width="0"/>
            <path d="M20 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2Z"/>
            <path d="M9 2v4M15 2v4M9 6h6" stroke="#0f0800" stroke-width="1.4" stroke-linecap="round" fill="none"/>
            <circle cx="12" cy="13" r="3" fill="#0f0800" opacity=".55"/>
            <path d="M7 19c0-2.21 2.24-4 5-4s5 1.79 5 4" fill="#0f0800" opacity=".55"/>
          </svg>
        </div>
        <div>
          <div class="card-title">Employee</div>
          <div class="card-sub" style="margin-top:4px;">Team poster</div>
        </div>
        <div class="arrow-hint">View → </div>
      </a>

    </div>

  </div>

  <script>
    // Generate floating confetti dots
    const colors = ['#c9a84c','#f0d080','#e8b86d','#fff8dc','#d4a853'];
    for (let i = 0; i < 22; i++) {
      const dot = document.createElement('div');
      dot.className = 'confetti-dot';
      const size = Math.random() * 5 + 2;
      dot.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${6 + Math.random()*10}s;
        animation-delay:${Math.random()*10}s;
      `;
      document.body.appendChild(dot);
    }
  </script>

</body>
</html>
