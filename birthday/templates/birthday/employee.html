    {% load static %}
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Birthday Poster</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" type="text/css" href="{% static 'birthday/style2.css' %}">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&display=swap" rel="stylesheet">

        <style>
            
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
}

.container-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #000;
}

.shape-container {
    width: 100%;
    max-width: 580px;
    aspect-ratio: 1080/2300;
    position: relative;
    overflow: hidden;
    background: #f5f5f5;
}

/* Desktop: Add black bars on sides */
@media (min-width: 580px) {
    .container-wrapper {
        background: #000;
    }
}

/* Mobile: Full width, no black bars */
@media (max-width: 579px) {
.date-box {
    scale: 0.7 !important;
}

.shape-container {
    max-width: 100vw;
    height: 100vh;
}
.container-wrapper {
    background: #f5f5f5;
}
.photo-container {
        width: 62% !important;
}
    #bottomLogos img {
        height: 3rem !important;
        max-width: 100px !important;
    }
}

.purple-shape {
    background: #833E91;
    border-bottom-right-radius: 70px;
}
.playfair {
    font-family: 'Playfair Display', serif;
}
.para {
    font-family: "DM Serif Text", serif;
}

/* Mobile: Move flag up */
@media (max-width: 579px) {
    .celebration-flag {
        top: -10% !important;
    }
}

.canvas-safe {
    color: #ffffff !important;
}

        </style>
 
    </head>
    <body>
        <div class="container-wrapper">
            <div id="poster"  class="shape-container">
                
                <!-- Purple rounded shape -->
                <div class="purple-shape absolute top-0 left-0 w-[43%] h-[48%]"></div>
                
                <!-- Abstract background image -->
                <img src="{% static 'birthday/images2/Abstract Pattern.png' %}" alt="" class="absolute inset-0 w-full h-full z-0">
                <img src="{% static 'birthday/images2/Abstract Pattern.png' %}" alt="" class="absolute inset-0 w-full h-full z-0">
                
                <!-- Black section below line -->
                <div class="absolute bottom-0 left-0 right-0 bg-black z-5" style="height: 42%;"></div>
                
                <!-- Celebration flags at top right -->
                <div class="celebration-flag absolute -right-10 z-50 m-0 p-0 pointer-events-none" style="top:-6%;">
                    <img src="{% static 'birthday/images2/Celebration Flag.png' %}" alt="Celebration Flags" class="h-[300px] object-contain pointer-events-none" crossorigin="anonymous">
                </div>
                
                <!-- Polaroid-style photo container -->
                <div class=" photo-container absolute top-[6%] left-1/2 -translate-x-[60%] rotate-[-14deg] z-20 w-[55%] ">
                    <div class="bg-white p-6 shadow-2xl ">

                        <!-- Photo upload -->
                        <!-- Photo upload -->
                    <!-- Photo upload -->
                    <div 
                        id="photoContainer"
                        class="w-full bg-gray-200 overflow-hidden cursor-pointer"
                        style="aspect-ratio: 5.3/5; background-image: url('{% static "birthday/images2/him.jpeg" %}'); background-size: cover; background-position: center top; background-repeat: no-repeat;"
                        onclick="document.getElementById('photoInput').click()">

                        <input
                            type="file"
                            id="photoInput"
                            accept="image/*"
                            class="hidden"
                            onchange="previewPhoto(event)"
                        >
                    </div>
    
                        <!-- Text content -->
                        <div class="text-center pt-1 px-2">
                            <p contenteditable="true" class="playfair text-purple-800" style="font-size: clamp(15px, 3.5vw, 20px);">NAME</p>
                            <div class="inline-block mt-1 px-3 py-1" style="background: #833E91;">
                                <p contenteditable="true"
                                    style="
                                        font-family: 'Playfair Display', serif;
                                        font-size: clamp(12px, 2.8vw, 15px);
                                        color: #ffffff;
                                        display: inline-block;
                                        -webkit-font-smoothing: antialiased;
                                        transform: translateZ(0);
                                        line-height: 1.2;
                                        padding-bottom: 2px;
                                    ">
                                    <span style="color:#ffffff;">Designation</span>
                                </p>

                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Cake image -->
                <div class="absolute left-[28%] z-20" style="top: 34%;">
                    <img 
                        src="{% static 'birthday/images2/Cake.png' %}" 
                        alt="Birthday Cake"
                        class="w-24 sm:w-32 h-auto object-contain" crossorigin="anonymous"
                    >
                </div>
                
                <!-- HAPPY BIRTHDAY text -->
                <div class="absolute right-[7%] z-20" style="top: 34%;">
                    <h1 class="playfair font-bold leading-none text-center" style="font-size: clamp(15px, 8vw, 50px); color: #80398E; line-height: 0.85;">
                        HAPPY<br><span class="inline-block mt-2">BIRTHDAY</span>
                    </h1>
                </div>
                
                <!-- Thank you message -->
                <div class="absolute right-[6%] z-20 max-w-[50%]" style="top: 43%;">
                    <p class="para font-medium text-left leading-tight" style="font-size: clamp(12px, 2.8vw, 17px); color: #80398E;">
                        Thank you for being a valuable part <br>of the team. Wishing you the best <br> in the year ahead!
                    </p>
                </div>
                
                <!-- Date box -->
                <!-- Date box -->
<div class="date-box absolute left-[1%] z-30 shadow-lg flex items-center scale-50 border-white border-2" style="bottom: 53%;">
    <div class="px-4 py-2 text-center bg-white" style="border-color: #833E91;">
        <p contenteditable="true" class="poppins leading-none" style="font-size: clamp(32px, 5vw, 42px); color: #833E91; line-height: 1; padding-bottom: 2px;">
            27<sup contenteditable="false" class="text-lg">th</sup>
        </p>
    </div>

    <div class="px-4 py-2 text-center">
        <p contenteditable="true" class="poppins text-white" style="letter-spacing: 2px; font-size: clamp(16px, 2.5vw, 30px); line-height: 1; padding-bottom: 2px;">
            MONTH
        </p>
    </div>
</div>
                
                <!-- Horizontal line -->
                <hr id="horizontalLine" class="absolute bottom-[42%] w-full border-t border-gray-400 z-20">

                <!-- Bottom logos -->
                <div id="bottomLogos" class="absolute bottom-[42%] left-0 right-0 flex justify-between items-center px-6 z-30">
                    <!-- Avanzo Charitable Trust Logo (Left - Gold) -->
                    <div class="flex-1 flex justify-start">
                        <img src="{% static 'birthday/images2/Avanzo Trust Logo White.png' %}" alt="Avanzo Charitable Trust" class="h-25  w-auto object-contain" style="max-width: 180px;">
                    </div>
                    
                    <!-- Avanzo Cyber Security Solutions Logo (Center) -->
                    <div class="flex-1 flex justify-center">
                        <img src="{% static 'birthday/images2/logo black.png' %}" alt="Avanzo Cyber Security Solutions" class="h-25 w-auto object-contain" style="max-width: 180px;">
                    </div>
                    
                    <!-- Avanzo Cyber Institute Logo (Right - Purple) -->
                    <div class="flex-1 flex justify-end">
                        <img src="{% static 'birthday/images2/Accademy Logo full white.png' %}" alt="Avanzo Cyber Institute" class="h-22 w-15 object-contain" style="max-width: 180px;">
                    </div>
                </div>

            </div>
        </div>

<!-- Download Image Button -->
<!-- Download Image -->
<button
    onclick="downloadImage()"
    class="fixed bottom-40 right-6 z-[999] bg-green-600 hover:bg-green-700 text-white px-5 py-3 rounded-full shadow-xl flex items-center gap-2"
>
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
    </svg>

     Download Image
</button>

<!-- Download PDF -->
<button
    onclick="downloadPDF()"
    class="fixed bottom-24 right-6 z-[999] bg-purple-700 hover:bg-purple-800 text-white px-5 py-3 rounded-full shadow-xl flex items-center gap-2"
>
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
    </svg> Download PDF
</button>

<!-- Logout -->
<a
    href="{% url 'logout' %}"
    class="fixed bottom-8 right-6 z-[999] bg-red-600 hover:bg-red-700 text-white px-5 py-3 rounded-full shadow-xl flex items-center gap-2"
>
    ⏻ Logout
</a>


    <script>
function previewPhoto(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function (e) {
        document.getElementById('photoContainer').style.backgroundImage = `url('${e.target.result}')`;
    };
    reader.readAsDataURL(file);
}
    </script>

    <!-- html2canvas -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <!-- jsPDF -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

    <script>
async function downloadImage() {
    const poster = document.getElementById("poster");
    const blackSection = document.querySelector('.absolute.bottom-0.bg-black');
    const horizontalLine = document.getElementById("horizontalLine");
    
    if (blackSection) blackSection.style.display = "none";
    if (horizontalLine) horizontalLine.style.display = "none";

    const canvas = await html2canvas(poster, {
        scale: 3,
        useCORS: true,
        backgroundColor: "#f5f5f5"
    });

    if (blackSection) blackSection.style.display = "block";
    if (horizontalLine) horizontalLine.style.display = "block";

    const croppedCanvas = document.createElement('canvas');
    const cropHeight = canvas.height * 0.58;
    croppedCanvas.width = canvas.width;
    croppedCanvas.height = cropHeight;
    
    const ctx = croppedCanvas.getContext('2d');
    ctx.drawImage(canvas, 0, 0);

    const imgData = croppedCanvas.toDataURL("image/png");
    const link = document.createElement('a');
    link.download = 'birthday-poster.png';
    link.href = imgData;
    link.click();
}

async function downloadPDF() {
    const poster = document.getElementById("poster");
    const blackSection = document.querySelector('.absolute.bottom-0.bg-black');
    const horizontalLine = document.getElementById("horizontalLine");
    
    if (blackSection) blackSection.style.display = "none";
    if (horizontalLine) horizontalLine.style.display = "none";

    const canvas = await html2canvas(poster, {
        scale: 2,
        useCORS: true,
        backgroundColor: "#f5f5f5"
    });

    if (blackSection) blackSection.style.display = "block";
    if (horizontalLine) horizontalLine.style.display = "block";

    const croppedCanvas = document.createElement('canvas');
    const cropHeight = canvas.height * 0.58;
    croppedCanvas.width = canvas.width;
    croppedCanvas.height = cropHeight;
    
    const ctx = croppedCanvas.getContext('2d');
    ctx.drawImage(canvas, 0, 0);

    const imgData = croppedCanvas.toDataURL("image/png");
    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF("p", "mm", "a5");
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();

    const imgRatio = croppedCanvas.width / croppedCanvas.height;
    const pdfRatio = pdfWidth / pdfHeight;

    let imgWidth = pdfWidth;
    let imgHeight = pdfHeight;
    let x = 0;
    let y = 0;

    if (imgRatio > pdfRatio) {
        imgHeight = pdfWidth / imgRatio;
        y = (pdfHeight - imgHeight) / 2;
    } else {
        imgWidth = pdfHeight * imgRatio;
        x = (pdfWidth - imgWidth) / 2;
    }

    pdf.addImage(imgData, "PNG", x, y, imgWidth, imgHeight);
    pdf.save("birthday-poster.pdf");
}
    </script>



    </body>
    </html>
